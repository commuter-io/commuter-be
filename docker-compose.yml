version: '3.8'
services:
  app:
    build: .
    container_name: spring_app
    ports:
      - "8000:8080"   # 호스트 8000 컨테이너 8080
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/commuter?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: commuter
      SPRING_DATASOURCE_PASSWORD: commuter
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - backend_net

  db:
    image: mysql:8.0
    container_name: commuter_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: commuter
      MYSQL_USER: commuter
      MYSQL_PASSWORD: commuter
    ports:
      - "3307:3306"   # 로컬에서 3307로 접속 가능
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_net

volumes:
  db_data:

networks:
  backend_net:
