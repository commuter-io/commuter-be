server:
  port: 8080
  address: 0.0.0.0  # Docker 외부 접속 가능하도록 추가

spring:
  datasource:
    url: jdbc:mysql://db:3306/commuter?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: commuter
    password: commuter
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발용: update, 운영용: validate or none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

jwt:
  secret: my-secret-key-please-change-this
  expiration: 3600000   # 1시간 (밀리초)
